validation.user.password.notBlank=密码不能为空
validation.user.password.pattern=密码需包含字母、数字和特殊字符，长度8-64
validation.user.newPassword.notBlank=新密码不能为空
validation.user.newPassword.pattern=新密码必须包含字母、数字和特殊字符，且长度在8-64位之间
validation.user.oldPassword.notBlank=旧密码不能为空
validation.user.nickname.size=昵称不能超过50个字符
validation.user.avatar.size=头像链接长度不能超过255个字符
validation.user.description.size=个人简介不能超过255个字符
validation.user.email.size=邮箱长度不能超过100个字符
