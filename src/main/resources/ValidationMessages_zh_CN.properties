validation.user.username.pattern=用户名只能包含字母、数字、下划线和连字符
validation.user.password.notBlank=密码不能为空
validation.user.password.pattern=密码需包含字母、数字和特殊字符，长度8-64
validation.user.newPassword.notBlank=新密码不能为空
validation.user.newPassword.pattern=新密码需包含字母、数字和特殊字符，长度8-64
validation.user.oldPassword.notBlank=当前密码不能为空
validation.user.nickname.size=昵称不能超过50个字符
validation.user.avatar.size=头像URL不能超过255个字符
validation.user.description.size=个人简介不能超过255个字符
validation.user.email.size=邮箱不能超过100个字符
validation.user.email.format=邮箱格式不正确
validation.user.usernameLogin.notBlank=用户名/邮箱不能为空
validation.user.usernameLogin.size=用户名/邮箱过长
validation.user.passwordLogin.notBlank=密码不能为空
validation.user.passwordLogin.size=密码过长

