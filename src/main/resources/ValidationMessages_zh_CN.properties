# Validation - Post
validation.post.title.notBlank=文章标题不能为空
validation.post.title.size=文章标题不能超过255个字符
validation.post.slug.notBlank=文章别名不能为空
validation.post.slug.size=文章别名不能超过255个字符
validation.post.slug.pattern=文章别名只能包含小写字母、数字和连字符
validation.post.summary.size=文章摘要不能超过500个字符
validation.post.content.notBlank=文章内容不能为空
validation.post.coverImage.size=封面图片URL不能超过255个字符
validation.post.isPinned.notNull=置顶状态不能为空
validation.post.status.notNull=文章状态不能为空
validation.post.status.range=状态只能是 0 或 1

# Validation - Tag
validation.tag.name.notBlank=标签名称不能为空
validation.tag.name.size=标签名称不能超过50个字符

# Validation - Link
validation.link.name.notBlank=友链名称不能为空
validation.link.name.size=友链名称不能超过100个字符
validation.link.url.notBlank=友链URL不能为空
validation.link.url.size=友链URL不能超过255个字符
validation.link.avatar.size=友链头像URL不能超过255个字符
validation.link.description.size=友链描述不能超过255个字符
validation.link.status.notNull=友链状态不能为空
validation.link.status.range=状态只能是 0 或 1

# Validation - User
validation.user.username.notBlank=用户名不能为空
